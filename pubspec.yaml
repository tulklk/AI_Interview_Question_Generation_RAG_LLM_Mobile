name: hiregen_ai_mobile
description: HireGen AI - Smart Recruitment Platform powered by AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI & Animation
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Icons
  phosphor_flutter: ^2.1.0

  # Font
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # HTTP
  dio: ^5.4.3+1

  # Auth
  google_sign_in: ^6.2.1

  # Utils
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.4.2

  # Misc
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  confetti: ^0.7.0
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
